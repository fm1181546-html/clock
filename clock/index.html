<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Fadel • Analog Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="topbar">
            <div class="brand">
                <div class="brand__name"></div>
                <div class="brand__tag">Analog Clock</div>
            </div>
            
            <div class="readout" aria-label="Digital time and date">
                <div class="readout__time" id="digital-time">--:--:--</div>
                <div class="readout__date" id="digital-date">----</div>
            </div>

            <div class="controls">
                <div class="theme-switch" aria-label="Color theme">
                    <button class="theme-btn" data-theme="ocean" type="button">Ocean</button>
                    <button class="theme-btn" data-theme="sunset" type="button">Sunset</button>
                    <button class="theme-btn" data-theme="forest" type="button">Forest</button>
                </div>
                <div class="mode-switch" role="button" tabindex="0">Dark Mode</div>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="clock">
                <label style="--i: 1"><span>1</span></label>
                <label style="--i: 2"><span>2</span></label>
                <label style="--i: 3"><span>3</span></label>
                <label style="--i: 4"><span>4</span></label>
                <label style="--i: 5"><span>5</span></label>
                <label style="--i: 6"><span>6</span></label>
                <label style="--i: 7"><span>7</span></label>
                <label style="--i: 8"><span>8</span></label>
                <label style="--i: 9"><span>9</span></label>
                <label style="--i: 10"><span>10</span></label>
                <label style="--i: 11"><span>11</span></label>
                <label style="--i: 12"><span>12</span></label>

                <div class="indicator">
                    <span class="hand hour"></span>
                    <span class="hand minute"></span>
                    <span class="hand second"></span>
                </div>
            </div>

            <div class="photo-widget">
                <div class="widget-header">
                    <h3>Galeri Foto</h3>
                </div>
                <div class="widget-image">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=400&fit=crop" alt="Widget Photo" id="widget-photo">
                </div>
                <div class="widget-controls">
                    <button class="photo-btn" id="prev-photo" type="button">❮</button>
                    <button class="photo-btn" id="next-photo" type="button">❯</button>
                </div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
